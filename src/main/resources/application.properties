spring.application.name=BibliotecaPublicaVirtual
server.port=8080

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/meubanco
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- MinIO (S3 SDK) ---
# Endpoint aponta para a porta 9000 do container que colocamos no docker-compose
minio.endpoint=http://localhost:9000
minio.accessKey=admin
minio.secretKey=password123
minio.bucketName=biblioteca-pdf

# --- Configuração de Upload ---
# Necessário para o Spring aceitar arquivos de livros (PDFs) que costumam ser pesados
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB